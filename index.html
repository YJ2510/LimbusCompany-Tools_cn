<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimbusCompanyTool中文主页面</title>
    <style>
        body{
            background-color: rgb(70, 69, 69);
        }
        h1{
            text-align: center;
            color: white;
        }
        h2{
            text-align: center;
            color: white;
        }
        a{
            color:#87cefa;
        }
    </style>
</head>
<body>
    <h1>欢迎来到<i>LimbusCompanyTool</i>中文页面</h1>

    <!-- 积分显示区域 -->
    <div style="text-align:center; color:#ffdd44; font-size:22px;">
        当前但丁积分：<span id="userPoint">0</span>
    </div>

    <h2><p><a href="https://limbuscompany.huijiwiki.com/wiki/" target="_blank">点击以访问LimbusCompany中文维基</a></p></h2>

<div style="text-align:center;">
    <h2 style="display: inline-block;font-size: 30px; margin-right:5px;">镜牢挑战</h2>
    <button id="btn" onclick="showText()" style="padding:8px 20px; font-size:18px; border-radius:6px;">展开</button>
</div>

<div id="content" style="display: none; text-align:center;">
    <div style="text-align:center; margin:20px 0;">
        <h2>镜牢挑战抽取</h2>
        <button onclick="startDraw()" style="padding:8px 20px; font-size:18px; border-radius:6px;">开始抽取</button>
        <div id="result" style="margin-top:15px; font-size:30px; color:white;"></div>
        <!-- 加分按钮，默认禁用 -->
        <button id="addPointBtn" disabled onclick="addPoint()" style="padding:8px 20px; font-size:18px; border-radius:6px; margin-top:15px; background:#339933; color:white;">
            完成本次挑战 +5积分
        </button>
    </div>
</div>

    <h2>理想是很多084工具！！！目前只做了镜牢这块儿 目的是让打镜牢的但丁们不再无聊（对）然后请支持我（？？） 关注我好吧（不强求）目前暂未做其他功能，后续会慢慢完善的！！！但是也请大大们关注支持一下（（）有建议都可以提！我很乐意听大家的建议来完善！！！</h2>
    <h2>抖音号：YJ2510.love</h2>

    <!-- 新增：页面最底部 清除积分按钮 -->
    <div style="text-align:center; margin:30px 0;">
        <button onclick="clearAllPoint()" style="padding:8px 20px; font-size:16px; border-radius:6px; background:#992222; color:white;">
            清除全部积分
        </button>
    </div>

<script>
// ==========积分系统代码==========
let point = Number(localStorage.getItem("dantePoint")) || 0;
const pointDom = document.getElementById("userPoint");
const addPointBtn = document.getElementById("addPointBtn");
const resultDom = document.getElementById("result");

// 刷新积分显示
function refreshPointView(){
    pointDom.innerText = point;
    localStorage.setItem("dantePoint", point);
}
refreshPointView();

// 加分函数
function addPoint(){
    point += 5;
    refreshPointView();
    alert("挑战完成！获得5积分！");
    // 领取积分后：隐藏挑战文本 和 加分按钮
    resultDom.style.display = "none";
    addPointBtn.style.display = "none";
}

// 【新增】清除全部积分函数
function clearAllPoint(){
    // 二次确认，防止手滑误点
    let sure = confirm("⚠️确认清除所有但丁积分吗？该操作无法恢复！");
    if(sure){
        point = 0;
        localStorage.removeItem("dantePoint");
        refreshPointView();
        alert("积分数据已全部清除！");
    }
}

// ==========镜牢抽取代码==========
function startDraw(){
    let list = [
        "在商店里禁止治疗罪人",
        "仅可使用商店的治疗罪人或技能与被动来或事件治疗罪人（若奖励有治疗类E.G.O.可以拿 但是不可以进入战斗 恢复理智不算）",
        "整局经费不可超过2000",
        "禁止选择遭遇战奖励",
        "禁止选择奖励的E.G.O饰品（观测和体系选择的饰品可以拿）",
        "禁止判定失败"
    ];
    let randomIndex = Math.floor(Math.random() * list.length);
    resultDom.innerText = list[randomIndex];
    // 重新抽取时，恢复显示条目和按钮
    resultDom.style.display = "block";
    addPointBtn.style.display = "inline-block";
    addPointBtn.disabled = false;
}

function showText(){
    let box = document.getElementById("content");
    let button = document.getElementById("btn");
    if(box.style.display === "none"){
        box.style.display = "block";
        button.innerText = "收起";
    }else{
        box.style.display = "none";
        button.innerText = "展开";
    }
}
</script>

</body>
</html>
